services:
  server:
    build:
      context: ./_ARQITEKT/server
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - NODE_ENV=production
      - WORKSPACE_ROOT=/workspace
      - HUB_ROOT=/app
      - CORS_ORIGINS=http://localhost,http://hub
    volumes:
      # Mount workspace so the server can access project directories
      - .:/workspace
      # Mount config directory for persistent data (users.yaml, projects.yaml)
      - ./_ARQITEKT/config:/app/config
    restart: unless-stopped
    networks:
      - arqitekt

  hub:
    build:
      context: ./_ARQITEKT/hub
      dockerfile: Dockerfile
    ports:
      - "${HUB_PORT:-80}:80"
    volumes:
      - ./_ARQITEKT/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - arqitekt

networks:
  arqitekt:
    driver: bridge
