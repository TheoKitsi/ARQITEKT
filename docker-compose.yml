services:
  server:
    build:
      context: ./_ARQITEKT/server
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - NODE_ENV=production
      - WORKSPACE_ROOT=/workspace
      - HUB_ROOT=/app
      - CORS_ORIGINS=http://localhost,http://hub
    volumes:
      # Mount workspace so the server can access project directories
      - .:/workspace
      # Mount config directory for persistent data (users.yaml, projects.yaml)
      - ./_ARQITEKT/config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3334/api/hub/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - arqitekt

  hub:
    build:
      context: ./_ARQITEKT/hub
      dockerfile: Dockerfile
    ports:
      - "${HUB_PORT:-80}:80"
    volumes:
      - ./_ARQITEKT/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - arqitekt

networks:
  arqitekt:
    driver: bridge
