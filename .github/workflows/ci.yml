name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  npm_config_registry: https://registry.npmjs.org/

jobs:
  # --- Hub Frontend ---
  hub-typecheck:
    name: Hub TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: _ARQITEKT/hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: _ARQITEKT/hub/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  hub-test:
    name: Hub Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: _ARQITEKT/hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: _ARQITEKT/hub/package-lock.json
      - run: npm ci
      - run: npm test

  hub-build:
    name: Hub Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: _ARQITEKT/hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: _ARQITEKT/hub/package-lock.json
      - run: npm ci
      - run: npm run build

  # --- Server Backend ---
  server-typecheck:
    name: Server TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: _ARQITEKT/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: _ARQITEKT/server/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  server-test:
    name: Server Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: _ARQITEKT/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: _ARQITEKT/server/package-lock.json
      - run: npm ci
      - run: npm test

  # --- Flutter Mobile ---
  mobile-analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze

  # --- E2E (local only — requires project workspace data on disk) ---
  # To run locally: cd _ARQITEKT/hub && npx playwright test
