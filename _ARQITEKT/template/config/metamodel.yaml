# ============================================================================
# ARQITEKT — Metamodel Configuration
# ============================================================================
# Defines the requirement hierarchy, allowed relationships,
# naming conventions, and status workflow.
# This file is the Single Source of Truth for the structure.
# ============================================================================

project:
  framework: ARQITEKT
  version: "1.0"

# ----------------------------------------------------------------------------
# Entity Hierarchy
# ----------------------------------------------------------------------------
entities:
  # --- Core Requirements Tree ---
  - name: BusinessCase
    prefix: BC
    pattern: "BC-{n}"
    directory: requirements/
    filename: "00_BUSINESS_CASE.md"
    template: requirements/templates/business-case.md
    allowedParents: []
    allowedChildren: [Solution]
    maxInstances: 1

  - name: Solution
    prefix: SOL
    pattern: "SOL-{n}"
    directory: requirements/solutions/
    filename: "SOL-{n}_{title}.md"
    template: requirements/templates/solution.md
    allowedParents: [BusinessCase]
    allowedChildren: [UserStory]

  - name: UserStory
    prefix: US
    pattern: "US-{sol}.{n}"
    directory: requirements/user-stories/
    filename: "US-{sol}.{n}_{title}.md"
    template: requirements/templates/user-story.md
    allowedParents: [Solution]
    allowedChildren: [Component]

  - name: Component
    prefix: CMP
    pattern: "CMP-{sol}.{us}.{n}"
    directory: requirements/components/
    filename: "CMP-{sol}.{us}.{n}_{title}.md"
    template: requirements/templates/component.md
    allowedParents: [UserStory]
    allowedChildren: [Function]

  - name: Function
    prefix: FN
    pattern: "FN-{sol}.{us}.{cmp}.{n}"
    directory: requirements/functions/
    filename: "FN-{sol}.{us}.{cmp}.{n}_{title}.md"
    template: requirements/templates/function.md
    allowedParents: [Component]
    allowedChildren: [ConversationFlow]

  # --- Extended Types ---
  - name: ConversationFlow
    prefix: CONV
    pattern: "CONV-{sol}.{us}.{cmp}.{fn}.{n}"
    directory: requirements/conversations/
    filename: "CONV-{sol}.{us}.{cmp}.{fn}.{n}_{title}.md"
    template: requirements/templates/conversation.md
    allowedParents: [Function]
    allowedChildren: []
    description: "Chatbot/AI conversation: Intent -> Response -> Escalation"

  - name: Notification
    prefix: NTF
    pattern: "NTF-{n}"
    directory: requirements/notifications/
    filename: "NTF-{n}_{title}.md"
    template: requirements/templates/notification.md
    allowedParents: []
    allowedChildren: []
    crossCutting: true
    description: "Notification channel: Push, Email, SMS, In-App"

  # --- Cross-Cutting (no parent-child) ---
  - name: Infrastructure
    prefix: INF
    pattern: "INF-{n}"
    directory: requirements/infrastructure/
    filename: "INF-{n}_{title}.md"
    template: requirements/templates/infrastructure.md
    allowedParents: []
    allowedChildren: []
    crossCutting: true
    constrains: [all]
    description: "Cross-cutting requirement: WCAG, OWASP, DSGVO, i18n, State, Performance, CI/CD"

  - name: ArchitectureDecision
    prefix: ADR
    pattern: "ADR-{n}"
    directory: requirements/adrs/
    filename: "ADR-{n}_{title}.md"
    template: requirements/templates/adr.md
    allowedParents: []
    allowedChildren: []
    crossCutting: true
    constrains: [all]
    description: "Architecture decision with reasoning, alternatives, and consequences"

  - name: Feedback
    prefix: FBK
    pattern: "FBK-{n}"
    directory: requirements/feedback/
    filename: "FBK-{n}_{title}.md"
    template: requirements/templates/feedback.md
    allowedParents: []
    allowedChildren: []
    crossCutting: true
    description: "User feedback from manual input, app store reviews, or in-app reports"

  - name: UISpec
    prefix: UI
    pattern: "UI-{sol}.{us}.{n}"
    directory: requirements/ui-specs/
    filename: "UI-{sol}.{us}.{n}_{title}.md"
    template: requirements/templates/ui-spec.md
    allowedParents: [UserStory]
    allowedChildren: []
    crossCutting: false
    description: "UI specification for user-facing features: screens, components, data bindings, navigation"

# ----------------------------------------------------------------------------
# Relationship Types
# ----------------------------------------------------------------------------
relations:
  - name: refines
    directional: true
    description: "Child refines parent (standard parent->child)"

  - name: constrains
    directional: true
    description: "Cross-cutting constraint (INF/ADR -> any entity)"

  - name: depends_on
    directional: true
    description: "Prerequisite (SOL-1 depends_on SOL-2)"

  - name: triggers
    directional: true
    description: "Triggers notification (FN -> NTF)"

# ----------------------------------------------------------------------------
# Optional Frontmatter Fields
# ----------------------------------------------------------------------------
# In addition to mandatory fields (type, id, title, status, parent),
# artifacts may include optional cross-cutting relationships:
#
# relationships:
#   depends_on: []    # IDs this artifact depends on
#   constrains: []    # IDs this artifact constrains

# ----------------------------------------------------------------------------
# Status Workflow
# ----------------------------------------------------------------------------
statuses:
  - name: idea
    description: "Initial idea, not yet elaborated"
    transitions: [draft]

  - name: draft
    description: "Elaborated but not yet reviewed"
    transitions: [review, idea]

  - name: review
    description: "Under review by @review agent or stakeholder"
    transitions: [approved, draft]

  - name: approved
    description: "Accepted, ready for implementation"
    transitions: [implemented, review]

  - name: implemented
    description: "Implemented and verified"
    transitions: [approved]

# ----------------------------------------------------------------------------
# Validation Rules
# ----------------------------------------------------------------------------
validation:
  rules:
    - id: V-001
      rule: "Every SOL must have at least one US"
      scope: Solution
      check: "children.UserStory.count >= 1"

    - id: V-002
      rule: "Every US must have at least one CMP"
      scope: UserStory
      check: "children.Component.count >= 1"

    - id: V-003
      rule: "Every CMP must have at least one FN"
      scope: Component
      check: "children.Function.count >= 1"

    - id: V-004
      rule: "Every US must have acceptance criteria"
      scope: UserStory
      check: "content.acceptance_criteria.count >= 1"

    - id: V-005
      rule: "Child status must not exceed parent status"
      scope: all
      check: "child.status.order <= parent.status.order"

    - id: V-006
      rule: "Mandatory frontmatter fields must be populated"
      scope: all
      check: "frontmatter.type AND frontmatter.title AND frontmatter.status"

    - id: V-007
      rule: "No orphaned references"
      scope: all
      check: "all references resolve to existing files"

    - id: V-008
      rule: "NTF must define at least one channel"
      scope: Notification
      check: "content.channels.count >= 1"

    # --- Semantic Validation Rules (Phase 3 — Metaketten) ---

    - id: V-009
      rule: "BC must answer WHO, WHAT, WHY, FOR WHOM"
      scope: BusinessCase
      check: "content contains who/what/why/target sections"

    - id: V-010
      rule: "US must have Gherkin-compatible acceptance criteria"
      scope: UserStory
      check: "content.acceptance_criteria matches Given/When/Then pattern"

    - id: V-011
      rule: "No duplicate titles within same hierarchy level"
      scope: all
      check: "siblings.title.unique == true"

    - id: V-012
      rule: "FN must define input, output, and error case"
      scope: Function
      check: "content contains input AND output AND error sections"

    - id: V-013
      rule: "INF must reference DSGVO or OWASP"
      scope: Infrastructure
      check: "content references regulatory standards"

    - id: V-014
      rule: "SOL must link at least one ADR"
      scope: Solution
      check: "content or relationships reference ADR-*"

    - id: V-015
      rule: "No references to non-existent artifact IDs"
      scope: all
      check: "all inline ID references resolve to existing artifacts"

    - id: V-016
      rule: "Full status consistency (BC through FN)"
      scope: all
      check: "parent.status.order >= max(children.status.order)"

    - id: V-017
      rule: "Confidence score meets gate threshold"
      scope: all
      check: "artifact.confidence >= gate.autoPassThreshold"

    - id: V-018
      rule: "All critical probing questions must be answered"
      scope: all
      check: "open_probing_questions.severity.critical == 0"

    - id: V-019
      rule: "Cross-reference coherence (parent-child descriptions)"
      scope: all
      check: "LLM: child description is consistent with parent scope"

    - id: V-020
      rule: "Boundary/error coverage >= 3 edge cases per FN"
      scope: Function
      check: "content.edge_cases.count >= 3"

    # --- Metaketten v2.0 Validation Rules ---

    - id: V-021
      rule: "US acceptance criteria must follow Given/When/Then with concrete values"
      scope: UserStory
      check: "content.acceptance_criteria Given/When/Then contain specific values, not vague terms"
      metakettenPhase: 2

    - id: V-022
      rule: "FN pre/post-conditions must be explicitly stated"
      scope: Function
      check: "content contains explicit PRE and POST condition sections"
      metakettenPhase: 4

    - id: V-023
      rule: "No logical contradictions between sibling FN specifications"
      scope: Function
      check: "LLM: sibling FN pre/post-conditions do not contradict each other"
      metakettenPhase: 2

    - id: V-024
      rule: "User-facing US must have at least one UISpec artifact"
      scope: UserStory
      check: "children.UISpec.count >= 1 OR content references UI-* artifact"
      metakettenPhase: 6

    - id: V-025
      rule: "BC should have estimated_effort and business_value in frontmatter"
      scope: BusinessCase
      check: "frontmatter.estimated_effort AND frontmatter.business_value are present"
      severity: low
      metakettenPhase: 9
      roadmap: true

# ----------------------------------------------------------------------------
# Pipeline Gates (Metaketten-Framework)
# ----------------------------------------------------------------------------
# Each gate guards a transition in the metamodel hierarchy.
# Artifacts must pass all mandatory checks before advancing.
# Confidence score ≥ autoPassThreshold triggers automatic acceptance.
# ----------------------------------------------------------------------------
gates:
  - id: G0_IDEA_TO_BC
    name: "Idea → Business Case"
    from: BC
    to: BC
    riskLevel: critical
    autoPassThreshold: 95
    agents: [socratic, example]
    mandatoryChecks:
      - "BC must answer WHO, WHAT, WHY, FOR WHOM"
      - "BC must define target market or audience"
      - "BC must have a unique value proposition"

  - id: G1_BC_TO_SOL
    name: "Business Case → Solutions"
    from: BC
    to: SOL
    riskLevel: high
    autoPassThreshold: 90
    agents: [socratic, constraint]
    mandatoryChecks:
      - "At least one SOL exists (V-001 prerequisite)"
      - "All feature areas from BC are covered by SOLs"
      - "No duplicate SOL titles"
      - "At least one INF requirement exists"

  - id: G2_SOL_TO_US
    name: "Solutions → User Stories"
    from: SOL
    to: US
    riskLevel: high
    autoPassThreshold: 90
    agents: [example, constraint]
    mandatoryChecks:
      - "Every SOL has at least one US (V-001)"
      - "Every US has acceptance criteria (V-004)"
      - "Every US defines actors/personas"
      - "No orphaned parent references (V-007)"

  - id: G3_US_TO_CMP
    name: "User Stories → Components"
    from: US
    to: CMP
    riskLevel: medium
    autoPassThreshold: 85
    agents: [devils_advocate, boundary]
    mandatoryChecks:
      - "Every US has at least one CMP (V-002)"
      - "Technical decomposition covers all US acceptance criteria"
      - "No duplicate CMP within same US"

  - id: G4_CMP_TO_FN
    name: "Components → Functions"
    from: CMP
    to: FN
    riskLevel: medium
    autoPassThreshold: 85
    agents: [boundary, devils_advocate]
    mandatoryChecks:
      - "Every CMP has at least one FN (V-003)"
      - "Each FN defines input and output"
      - "Boundary conditions are specified"

  - id: G5_FN_TO_CODE
    name: "Functions → Code"
    from: FN
    to: CODE
    riskLevel: critical
    autoPassThreshold: 95
    agents: [devils_advocate, constraint, boundary]
    mandatoryChecks:
      - "All FN have pre/post conditions"
      - "Error cases are defined for each FN"
      - "No unresolved conflicts between sibling FNs"
      - "All parent statuses are at least 'approved'"
      - "Child status does not exceed parent (V-005)"

  - id: G6_CODE_TO_DEPLOY
    name: "Code → Deployment"
    from: CODE
    to: DEPLOY
    riskLevel: critical
    autoPassThreshold: 95
    agents: [constraint, boundary]
    mandatoryChecks:
      - "All artifacts have status >= approved"
      - "Baseline exists and drift report is clean"
      - "All validation rules V-001 through V-025 pass"
      - "Traceability matrix has no orphans"

# ----------------------------------------------------------------------------
# Agent Configuration Reference
# ----------------------------------------------------------------------------
# Agent personas are defined in agents.yaml.
# Each gate references agents by name for probing sessions.
# ----------------------------------------------------------------------------
agents:
  configFile: agents.yaml
  promptsDir: prompts/
  personas:
    - socratic       # Guided questioning, Socratic method
    - devils_advocate # Challenge assumptions, find weaknesses
    - constraint     # Technical/regulatory constraints
    - example        # Concrete examples, edge cases
    - boundary       # Boundary conditions, error scenarios

# ----------------------------------------------------------------------------
# Knowledge Integrity
# ----------------------------------------------------------------------------
# Baseline and traceability features for drift detection and impact analysis.
# ----------------------------------------------------------------------------
integrity:
  baseline:
    storageDir: .arqitekt/
    storageFile: baseline.json
    hashAlgorithm: sha256
    hashLength: 16
  drift:
    kinds: [added, removed, title_changed, status_regressed, parent_changed, content_changed]
  traceability:
    expectChildrenFor: [SOL, US, CMP]
    crossCuttingTypes: [INF, ADR, NTF, FBK]

# ----------------------------------------------------------------------------
# Optional Roadmap Frontmatter Fields (Metaketten v2.0 — Phases 9-10)
# ----------------------------------------------------------------------------
# These fields are optional and support Economic Viability (Phase 9)
# and Organizational Readiness (Phase 10) analysis.
# ----------------------------------------------------------------------------
roadmapFields:
  economicViability:
    - name: estimated_effort
      type: string
      values: [XS, S, M, L, XL]
      description: "Development effort estimate"
      appliesTo: [BusinessCase, Solution, UserStory]
    - name: business_value
      type: integer
      range: [1, 5]
      description: "Business value score (1=nice-to-have, 5=critical)"
      appliesTo: [BusinessCase, Solution]
    - name: mvp_priority
      type: boolean
      description: "Whether this artifact belongs to the Minimum Viable Product"
      appliesTo: [Solution, UserStory]
  organizationalReadiness:
    - name: required_skills
      type: array
      description: "Technical skills needed for implementation"
      appliesTo: [Component, Function]
    - name: team_impact
      type: string
      values: [low, medium, high]
      description: "Impact on team workflow and skill requirements"
      appliesTo: [Solution, Component]
